name: parity

# JS vs Python parity harness. Compares chess4D-OC's JS Piece chain against
# chess-spectral's phase-operator legality oracle on the initial 4D position.
# This workflow is the AUTONOMY GATE for M4: if it disagrees, M4a's cutover
# from JS to Pyodide-canonical legality will silently ship broken moves.
#
# Soft-skips when no Cloudflare deployment is found (same pattern as smoke).
# Cron once a day on main as a drift detector — chess-spectral or chess4d
# can update via PyPI without us pushing, so a clean PR can drift later.

on:
  pull_request:
    branches: [main]
  schedule:
    # 06:00 UTC daily. Picks up package version drift even with no PR activity.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: read
  statuses: read
  pull-requests: read
  checks: read

concurrency:
  group: parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: Parity diff (JS vs Python)
    runs-on: ubuntu-latest
    # M20: bumped from 20 → 30 to match parity.spec.js PARITY_TIMEOUT increase
    # (12 min watchdog × 2 retries = 24 min + overhead).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve preview URL (Cloudflare or production)
        id: cf
        uses: actions/github-script@v7
        with:
          script: |
            // For PRs: poll for the PR's preview deploy.
            // For schedule/workflow_dispatch: use the production URL on main.
            const isCron = context.eventName === 'schedule' || context.eventName === 'workflow_dispatch';
            const sha = isCron
              ? (await github.rest.repos.getBranch({
                  owner: context.repo.owner, repo: context.repo.repo, branch: 'main'
                })).data.commit.sha
              : context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const TIMEOUT_MS = 4 * 60 * 1000;
            const POLL_MS    = 10 * 1000;
            const start = Date.now();

            async function findPreviewUrl() {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha,
              }).catch(() => ({ data: [] }));
              const cfDep = deployments.find(d =>
                (d.environment || '').toLowerCase().includes('preview') ||
                (d.environment || '').toLowerCase().includes('pages') ||
                (d.task || '').toLowerCase().includes('cloudflare')
              );
              if (cfDep) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: cfDep.id,
                });
                const latest = statuses[0];
                if (latest && latest.state === 'success') {
                  return { ok: true, url: latest.environment_url || latest.target_url };
                }
                if (latest && (latest.state === 'failure' || latest.state === 'error')) {
                  return { ok: false, reason: `cf-deploy-${latest.state}` };
                }
              }
              const { data: statusList } = await github.rest.repos.listCommitStatusesForRef({
                owner, repo, ref: sha,
              }).catch(() => ({ data: [] }));
              const cfStatus = statusList.find(s =>
                (s.context || '').toLowerCase().includes('cloudflare') ||
                (s.context || '').toLowerCase().includes('pages')
              );
              if (cfStatus && cfStatus.state === 'success' && cfStatus.target_url) {
                return { ok: true, url: cfStatus.target_url };
              }
              return { ok: false, reason: 'no-cf-signal' };
            }

            while (Date.now() - start < TIMEOUT_MS) {
              const r = await findPreviewUrl();
              if (r.ok) {
                core.info(`Preview URL: ${r.url}`);
                core.setOutput('url', r.url);
                core.setOutput('found', 'true');
                return;
              }
              if (r.reason && r.reason.startsWith('cf-deploy-')) {
                core.warning(`Cloudflare deployment failed (${r.reason}). Parity skipped.`);
                core.setOutput('found', 'false');
                return;
              }
              await new Promise(r => setTimeout(r, POLL_MS));
            }
            core.notice('No Cloudflare deployment found within 4 min. Parity skipped.');
            core.setOutput('found', 'false');

      - name: Skip parity (no Cloudflare deployment)
        if: steps.cf.outputs.found != 'true'
        run: echo "::notice::Cloudflare deployment not detected. Parity harness skipped."

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.found == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.cf.outputs.found == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.cf.outputs.found == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run parity harness
        if: steps.cf.outputs.found == 'true'
        env:
          PREVIEW_URL: ${{ steps.cf.outputs.url }}
        run: npx playwright test tests/parity.spec.js

      - name: Upload diff artifact
        if: always() && steps.cf.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: parity-diff
          path: |
            test-results/parity-diff.json
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
