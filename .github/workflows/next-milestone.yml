name: next-milestone

# Auto-advance: when a milestone PR is merged into main, open an issue
# for the next milestone. The autonomy gates (M3.5 parity, M6 -> M7,
# M8 -> M9) are encoded by mapping those milestones to an empty next
# value, which suppresses issue creation.
#
# See the plan file at:
#   C:\Users\sckir\.claude\plans\4d-chess-spectral-visualizer-floating-church.md
# section "Auto-advance mechanism" for the full design.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  open-next-milestone-issue:
    name: Open next milestone issue
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine merged milestone from labels
        id: milestone
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const milestoneLabel = labels.find(l => l.startsWith('milestone:'));
            if (!milestoneLabel) {
              core.info('Merged PR has no milestone:* label; skipping auto-advance.');
              return { merged: '', next: '' };
            }
            const merged = milestoneLabel.slice('milestone:'.length);

            // Auto-advance map. Empty string = STOP (require human review).
            // Keep this in sync with the plan file's milestone list.
            const nextOf = {
              'M1':   'M2',
              'M2':   'M3',
              'M3':   'M3.5',
              'M3.5': '',     // STOP: parity gate, user must approve M4a
              'M4a':  '',     // M4a triggers M4b via 7-day cron, not direct chain
              'M4b':  'M5',
              'M5':   'M6',
              'M6':   '',     // STOP: M7 perf is stretch, requires review
              'M7':   '',     // STOP: human-driven perf work
              'M8':   '',     // STOP: backlog only
              'M9':   ''      // STOP: done
            };
            const next = nextOf[merged] ?? '';

            core.info(`Merged milestone: ${merged}`);
            core.info(`Next milestone: ${next || '(STOP — no auto-advance)'}`);
            core.setOutput('merged', merged);
            core.setOutput('next', next);
            core.setOutput('pr_number', String(context.payload.pull_request.number));

      - name: Open issue for next milestone
        if: steps.milestone.outputs.next != ''
        uses: actions/github-script@v7
        env:
          MERGED: ${{ steps.milestone.outputs.merged }}
          NEXT: ${{ steps.milestone.outputs.next }}
          PR_NUMBER: ${{ steps.milestone.outputs.pr_number }}
        with:
          script: |
            const merged = process.env.MERGED;
            const next = process.env.NEXT;
            const prNumber = process.env.PR_NUMBER;

            const title = `${next}: begin milestone (auto-advance after #${prNumber})`;
            const body = [
              `Milestone **${merged}** was just merged in #${prNumber}.`,
              `Per the auto-advance pipeline, this issue triggers milestone **${next}**.`,
              ``,
              `## Instructions for the agent picking this up`,
              ``,
              `1. Read the plan file. The local maintainer's path is:`,
              `   \`C:\\Users\\sckir\\.claude\\plans\\4d-chess-spectral-visualizer-floating-church.md\``,
              `   (If running on a different machine, look for that file under the user's Claude plans directory.)`,
              `2. Find the section for milestone **${next}** and execute its deliverables.`,
              `3. Create a branch \`claude/${next.toLowerCase().replace('.', '-')}-<short-description>\` from \`main\`.`,
              `4. Open a PR titled \`${next}: <description>\`. Apply the \`milestone:${next}\` label.`,
              `5. Enable auto-merge unless the plan marks this milestone as a STOP / PAUSE gate.`,
              `6. Required CI checks: CodeQL, Lint (M2+), Smoke (M2+), Parity (M3.5+). Auto-merge holds until all required checks pass.`,
              `7. Close this issue once the PR is opened (link the PR in the close comment).`,
              ``,
              `## Context`,
              ``,
              `- Repo: ${context.repo.owner}/${context.repo.repo}`,
              `- Previous PR: #${prNumber}`,
              `- Plan: see CLAUDE.md and the plan file referenced above`,
              `- Memory: \`C:\\Users\\sckir\\.claude\\projects\\D--GitHub-chess4D-OC\\memory\\\` — read \`milestone-tracker.md\` first, update it after the PR opens.`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['claude:next-milestone', `milestone:${next}`]
            });
            core.info(`Opened issue #${issue.data.number}: ${issue.data.html_url}`);
