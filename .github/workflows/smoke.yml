name: smoke

# Headless Playwright smoke test against the Cloudflare Pages preview URL.
# Cloudflare Pages posts deployments via the GitHub Deployments API; we poll
# for the latest deployment on this PR's head SHA and wait for state=success,
# then read environment_url and pass it to Playwright.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read
  statuses: read
  pull-requests: read
  checks: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Headless smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Cloudflare Pages deployment
        id: cf
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const TIMEOUT_MS  = 6 * 60 * 1000; // 6 minutes
            const POLL_MS     = 10 * 1000;     // every 10 seconds
            const start = Date.now();

            core.info(`Polling Cloudflare deployment for SHA ${sha}…`);

            while (Date.now() - start < TIMEOUT_MS) {
              // Cloudflare Pages registers deployments via the Deployments API.
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha,
              });
              const cfDeployment = deployments.find(d =>
                (d.environment || '').toLowerCase().includes('preview') ||
                (d.environment || '').toLowerCase().includes('pages') ||
                (d.task || '').toLowerCase().includes('cloudflare')
              );

              if (cfDeployment) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: cfDeployment.id,
                });
                const latest = statuses[0]; // statuses are returned newest-first
                if (latest) {
                  core.info(`Deployment ${cfDeployment.id} state=${latest.state}`);
                  if (latest.state === 'success') {
                    const url = latest.environment_url || latest.target_url;
                    if (!url) {
                      throw new Error('Cloudflare deployment succeeded but no environment_url present');
                    }
                    core.info(`Preview URL: ${url}`);
                    core.setOutput('url', url);
                    return;
                  }
                  if (latest.state === 'failure' || latest.state === 'error') {
                    throw new Error(`Cloudflare deployment ${latest.state}: ${latest.log_url || latest.target_url || '(no log url)'}`);
                  }
                }
              } else {
                core.info('No Cloudflare deployment yet, retrying…');
              }

              await new Promise(r => setTimeout(r, POLL_MS));
            }
            throw new Error('Timed out waiting for Cloudflare Pages deployment');

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        env:
          PREVIEW_URL: ${{ steps.cf.outputs.url }}
        run: npm run test:smoke

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
