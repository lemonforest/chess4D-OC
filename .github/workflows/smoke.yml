name: smoke

# Headless Playwright smoke test against the Cloudflare Pages preview URL.
# Cloudflare Pages posts deployments via the GitHub Deployments API; we poll
# for the latest deployment on this PR's head SHA and wait for state=success,
# then read environment_url and pass it to Playwright.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: read
  statuses: read
  pull-requests: read
  checks: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Headless smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve preview URL (Cloudflare or skip)
        id: cf
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const TIMEOUT_MS  = 4 * 60 * 1000; // 4 minutes
            const POLL_MS     = 10 * 1000;
            const start = Date.now();

            core.info(`Polling Cloudflare deployment for SHA ${sha}…`);

            // Helper: try to find a Cloudflare-issued URL via deployments,
            // commit statuses, or check_runs. Cloudflare Pages historically
            // uses Deployments API; some setups post commit statuses instead.
            async function findPreviewUrl() {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha,
              }).catch(() => ({ data: [] }));
              const cfDep = deployments.find(d =>
                (d.environment || '').toLowerCase().includes('preview') ||
                (d.environment || '').toLowerCase().includes('pages') ||
                (d.task || '').toLowerCase().includes('cloudflare')
              );
              if (cfDep) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: cfDep.id,
                });
                const latest = statuses[0];
                if (latest) {
                  if (latest.state === 'success') {
                    return { ok: true, url: latest.environment_url || latest.target_url };
                  }
                  if (latest.state === 'failure' || latest.state === 'error') {
                    return { ok: false, reason: `cf-deploy-${latest.state}` };
                  }
                }
              }

              const { data: statusList } = await github.rest.repos.listCommitStatusesForRef({
                owner, repo, ref: sha,
              }).catch(() => ({ data: [] }));
              const cfStatus = statusList.find(s =>
                (s.context || '').toLowerCase().includes('cloudflare') ||
                (s.context || '').toLowerCase().includes('pages')
              );
              if (cfStatus && cfStatus.state === 'success' && cfStatus.target_url) {
                return { ok: true, url: cfStatus.target_url };
              }

              return { ok: false, reason: 'no-cf-signal' };
            }

            while (Date.now() - start < TIMEOUT_MS) {
              const r = await findPreviewUrl();
              if (r.ok) {
                core.info(`Preview URL: ${r.url}`);
                core.setOutput('url', r.url);
                core.setOutput('found', 'true');
                return;
              }
              if (r.reason && r.reason.startsWith('cf-deploy-')) {
                core.warning(`Cloudflare deployment failed (${r.reason}). Smoke skipped.`);
                core.setOutput('found', 'false');
                core.setOutput('reason', r.reason);
                return;
              }
              await new Promise(r => setTimeout(r, POLL_MS));
            }

            // Soft-skip: CF not configured (yet). Log a notice but don't fail
            // the workflow — that would block every PR until CF is wired up.
            // Once CF starts posting deployments, smoke will run automatically.
            core.notice(
              'No Cloudflare deployment found within 4 min. Skipping smoke. ' +
              'Verify the CF Pages project is connected to this repo at ' +
              'https://dash.cloudflare.com/?to=/:account/pages'
            );
            core.setOutput('found', 'false');
            core.setOutput('reason', 'timeout');

      - name: Skip smoke (no Cloudflare deployment)
        if: steps.cf.outputs.found != 'true'
        run: |
          echo "::notice::Cloudflare deployment not detected (reason=${{ steps.cf.outputs.reason }}). Smoke skipped — workflow exits clean so the PR isn't blocked."

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.found == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.cf.outputs.found == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.cf.outputs.found == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        if: steps.cf.outputs.found == 'true'
        env:
          PREVIEW_URL: ${{ steps.cf.outputs.url }}
        run: npm run test:smoke

      - name: Upload artifacts on failure
        if: failure() && steps.cf.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
